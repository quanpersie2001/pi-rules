name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Full check
        run: npm run check

      - name: Bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ inputs.version }} --no-push

      - name: Extract version
        id: version
        run: echo "VERSION=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          CURRENT_TAG="v${{ steps.version.outputs.VERSION }}"
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "BODY=Initial release." >> "$GITHUB_OUTPUT"
          else
            BODY=$(git log "$PREVIOUS_TAG..HEAD~1" --pretty=format:"- %s (%h)" --no-merges)
            echo "BODY<<EOF" >> "$GITHUB_OUTPUT"
            echo "$BODY" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Push commits and tags
        run: git push --follow-tags

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          body: |
            ## @quandev104/pi-rules@${{ steps.version.outputs.VERSION }}

            ${{ steps.notes.outputs.BODY }}

            ### Install

            ```bash
            pi install npm:@quandev104/pi-rules@${{ steps.version.outputs.VERSION }}
            ```
