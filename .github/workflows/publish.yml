name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - alpha
          - beta

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Full check
        run: npm run check

      - name: Bump version
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -- .
          if [ "${{ inputs.version }}" = "alpha" ]; then
            npm version prerelease --preid=alpha --no-push
          elif [ "${{ inputs.version }}" = "beta" ]; then
            npm version prerelease --preid=beta --no-push
          else
            npm version ${{ inputs.version }} --no-push
          fi
          VERSION=$(node -p 'require("./package.json").version')
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          git push --follow-tags

      - name: Generate release notes
        id: notes
        run: |
          CURRENT_TAG="v${{ steps.bump.outputs.VERSION }}"
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "BODY=Initial release." >> "$GITHUB_OUTPUT"
          else
            BODY=$(git log "$PREVIOUS_TAG..HEAD~1" --pretty=format:"- %s (%h)" --no-merges)
            echo "BODY<<EOF" >> "$GITHUB_OUTPUT"
            echo "$BODY" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        id: npm_publish
        continue-on-error: true
        run: |
          npm install
          if [ "${{ inputs.version }}" = "alpha" ]; then
            npm publish --access public --tag alpha
          elif [ "${{ inputs.version }}" = "beta" ]; then
            npm publish --access public --tag beta
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.VERSION }}
          name: v${{ steps.bump.outputs.VERSION }}
          prerelease: ${{ inputs.version == 'alpha' || inputs.version == 'beta' }}
          body: |
            ## @quandev104/pi-rules@${{ steps.bump.outputs.VERSION }}

            ${{ steps.notes.outputs.BODY }}

            ### Install

            ```bash
            pi install npm:@quandev104/pi-rules@${{ steps.bump.outputs.VERSION }}
            ```

            > Latest: `pi install npm:@quandev104/pi-rules`
            > Beta: `pi install npm:@quandev104/pi-rules@beta`
            > Alpha: `pi install npm:@quandev104/pi-rules@alpha`

      - name: Check npm publish status
        if: steps.npm_publish.outcome == 'failure'
        run: |
          echo "::warning::npm publish failed. GitHub Release was created but package was not published to npm."
          echo "::warning::Check NPM_TOKEN secret has bypass 2FA enabled."
